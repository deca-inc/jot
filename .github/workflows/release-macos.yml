name: Build and Release macOS App

on:
  push:
    tags: ['app-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
        working-directory: apps/app

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from tag (app-v1.0.0 -> 1.0.0)
            echo "version=${GITHUB_REF#refs/tags/app-v}" >> $GITHUB_OUTPUT
          fi

      - name: Update app version
        run: |
          # Update version in app.config.js
          VERSION=${{ steps.version.outputs.version }}
          sed -i '' "s/version: \"[0-9.]*\"/version: \"$VERSION\"/" apps/app/app.config.js

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Run Expo prebuild for macOS
        run: npx expo prebuild --platform ios --clean
        working-directory: apps/app
        env:
          EXPO_PUBLIC_APP_VARIANT: production

      - name: Install pods
        run: pod install --repo-update
        working-directory: apps/app/ios

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $CERT_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # Add keychain to search list
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build macOS app
        run: ./scripts/macos/build-macos.sh release
        working-directory: apps/app
        env:
          EXPO_PUBLIC_APP_VARIANT: production

      - name: Sign and notarize app
        run: |
          APP_PATH=$(find apps/app/ios/build -name "*.app" -type d | head -1)
          ./apps/app/scripts/macos/sign-and-notarize.sh "$APP_PATH"
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Create DMG
        id: dmg
        run: |
          APP_PATH=$(find apps/app/ios/build -name "*.app" -type d | head -1)
          VERSION=${{ steps.version.outputs.version }}
          DMG_PATH="apps/app/ios/build/Jot-${VERSION}.dmg"
          ./apps/app/scripts/macos/create-dmg.sh "$APP_PATH" "$DMG_PATH"
          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT

      - name: Generate appcast
        id: appcast
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ./apps/app/scripts/macos/generate-appcast.sh "${{ steps.dmg.outputs.dmg_path }}" "$VERSION"
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            apps/app/ios/build/*.dmg
            apps/app/ios/build/appcast.xml
          if-no-files-found: error

  release:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: releases

      - name: List artifacts
        run: ls -la releases/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/app-v}" >> $GITHUB_OUTPUT
          fi

      - name: Calculate SHA256 checksums
        working-directory: releases
        run: |
          echo "## SHA256 Checksums" > checksums.txt
          echo "" >> checksums.txt
          for file in *.dmg; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> checksums.txt
            fi
          done
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ steps.version.outputs.version }}
          name: Jot v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            releases/*.dmg
            releases/appcast.xml
            releases/checksums.txt
          body: |
            ## Jot v${{ steps.version.outputs.version }}

            ### Download

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon & Intel) | [Jot-${{ steps.version.outputs.version }}.dmg](https://github.com/${{ github.repository }}/releases/download/app-v${{ steps.version.outputs.version }}/Jot-${{ steps.version.outputs.version }}.dmg) |

            ### Installation

            1. Download the DMG file
            2. Open the DMG and drag Jot to your Applications folder
            3. Launch Jot from Applications

            **Note**: On first launch, you may need to right-click and select "Open" to bypass Gatekeeper.

            ### Automatic Updates

            Jot will automatically check for updates. You can also check manually via **Jot → Check for Updates**.

            ### System Requirements

            - macOS 12.0 (Monterey) or later
            - Apple Silicon or Intel processor
